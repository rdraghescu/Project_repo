version: '3.8'

services:
  mlflow:
    build: .
    container_name: mlflow-tracking-server
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
      - ../..:/workspace:ro  # Read-only acces la proiect pentru vizualizare
    environment:
      - MLFLOW_TRACKING_URI=http://localhost:5000
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts --allowed-hosts '*' --cors-allowed-origins '*'
    restart: unless-stopped

volumes:
  mlflow-data:
    driver: local

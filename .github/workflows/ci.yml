name: CI/CD Pipeline for Web Traffic Random Forest Model

on:
  push:
  pull_request:

jobs:
  test:
    name: Tests (bifa verde #1)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Docker/ci_cd_pipeline_docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies for tests
        run: pip install -r requirements-dev.txt

      - name: Prepare joblib model artifacts for CI
        # Copiaza modelul real din models/ sau genereaza un RF sintetic compatibil
        run: python prepare_ci_models.py

      - name: Validate joblib artifacts before tests
        run: python register_model.py models

      - name: Run pytest suite
        run: pytest tests/ -v --tb=short

  build:
    name: Docker build (bifa verde #2)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Prepare joblib artifacts inside pipeline folder
        working-directory: Docker/ci_cd_pipeline_docker
        run: |
          pip install -r requirements-dev.txt
          python prepare_ci_models.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          docker build \
            -f Docker/ci_cd_pipeline_docker/Dockerfile \
            -t web-traffic-rf-enhanced:latest \
            .

      - name: Smoke test container health endpoint
        run: |
          docker run -d --name rf-api-test -p 18501:8501 web-traffic-rf-enhanced:latest
          for i in $(seq 1 15); do
            if curl -sf http://localhost:18501/health; then
              echo "Health check passed"
              docker stop rf-api-test
              exit 0
            fi
            sleep 2
          done
          echo "Container failed to become healthy. Logs:"
          docker logs rf-api-test || true
          docker stop rf-api-test || true
          exit 1

      - name: Log in to Docker Hub
        # secrets.* nu poate fi folosit in expresia if:; ruleaza doar la push (nu la PR)
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image to Docker Hub
        if: github.event_name == 'push'
        run: |
          # Docker Hub: numele repository-ului trebuie sa fie lowercase
          docker tag web-traffic-rf-enhanced:latest ${{ secrets.DOCKER_USERNAME }}/web-traffic-prediction:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/web-traffic-prediction:latest
